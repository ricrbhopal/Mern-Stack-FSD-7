<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-primary">
    <div class="bg-primary p-3 d-flex justify-content-between w-100">
      <h1><i class="bi bi-people"></i> youtuebe</h1>

      <button>login</button>
    </div>

    <div class="alert alert-danger">this is a alert</div>
    <div
      class="d-grid d-lg-flex gap-5 justify-content-center align-items-center vh-100"
    >
      <div class="bg-light p-5" id="Login">
        <div class="border-bottom p-2 d-flex align-items-center gap-3">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="Enter Your Email"
            class="bg-transparent border border-0"
          />
        </div>
        <div class="border-bottom p-2 d-flex align-items-center gap-3">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            placeholder="Enter Your password"
            class="form-control"
          />
          <i class="bi bi-eye"></i>
        </div>

        <br />
        <br />
        <button class="btn btn-outline-primary w-100">Login</button>
      </div>
      <div class="bg-light p-5 rounded" id="Register">
        <div class="border-bottom p-2 d-flex align-items-center gap-3">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="Enter Your Email"
            class="bg-transparent border border-0"
          />
        </div>
        <div class="border-bottom p-2 d-flex align-items-center gap-3">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            placeholder="Enter Your password"
            class="form-control"
          />
          <i class="bi bi-eye"></i>
        </div>

        <br />
        <br />
        <button class="btn btn-outline-primary w-100">Login</button>
      </div>
    </div>

    <!-- BootStarp JS  -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
